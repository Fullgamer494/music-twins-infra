version: '3.9'

# MusicTwins: PostgreSQL (core) + MongoDB (mensajería)
# Uso: docker-compose --env-file .env.local -f docker-compose-databases.yml up -d

services:
  # PostgreSQL: usuarios, amigos, feed, reacciones, notas, conversaciones
  postgres:
    image: postgres:14-alpine
    container_name: musictwins_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-musictwins}
      POSTGRES_USER: ${DB_ADMIN_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_ADMIN_PASSWORD:-postgres}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./init-postgres.sql:/docker-entrypoint-initdb.d/01-init.sql
    networks:
      - musictwins
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_ADMIN_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # MongoDB: solo mensajes (conversations en PostgreSQL)
  mongodb:
    image: mongo:6
    container_name: musictwins_mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_DATABASE: ${MONGO_DB_NAME:-musictwins}
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ADMIN_USER:-mongo}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ADMIN_PASSWORD:-mongo}
    ports:
      - "${MONGO_PORT:-27017}:27017"
    volumes:
      - mongo_data:/data/db
      - ./init-mongodb.js:/docker-entrypoint-initdb.d/01-init.js
    networks:
      - musictwins
    command: --replSet rs0 --bind_ip_all
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand({ping:1})"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Inicializar replica set (necesario para transacciones en MongoDB)
  mongodb-init:
    image: mongo:6
    container_name: musictwins_mongo_init
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - musictwins
    command: >
      mongosh --host mongodb:27017
      --username ${MONGO_ADMIN_USER:-mongo}
      --password ${MONGO_ADMIN_PASSWORD:-mongo}
      --authenticationDatabase admin
      --eval "rs.initiate({_id:'rs0',members:[{_id:0,host:'mongodb:27017'}]})"
    restart: "no"

networks:
  musictwins:
    driver: bridge

volumes:
  pg_data:
  mongo_data:
